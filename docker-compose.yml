name: custom-pos
services:
  #-------------------------------------------------------------
  # 1. Java Spring Boot
  #-------------------------------------------------------------
  app:
    build: .
    container_name: custom-pos
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  #-------------------------------------------------------------
  # 2. PostgreSQL Database
  #-------------------------------------------------------------
  db:
    image: postgres:14-alpine
    container_name: custom-pos-db
    environment:
      - POSTGRES_DB=custom_pos_db
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME}
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

